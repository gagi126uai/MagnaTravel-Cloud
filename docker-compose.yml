services:
  db:
    image: postgres:16
    container_name: travel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel}
      POSTGRES_USER: ${POSTGRES_USER:-traveluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travelpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./logs:/var/lib/postgresql/logs # Optional db logs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traveluser} -d ${POSTGRES_DB:-travel}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    expose:
      - "5432"

  api:
    build:
      context: .
      dockerfile: src/TravelApi/Dockerfile
    container_name: travel_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/Uploads
      - ./logs:/app/logs
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Database=${POSTGRES_DB:-travel};Username=${POSTGRES_USER:-traveluser};Password=${POSTGRES_PASSWORD:-travelpass}
      Jwt__Key: ${JWT_KEY:-CHANGE_THIS_SECRET_IN_PRODUCTION}
      Jwt__Issuer: ${JWT_ISSUER:-MagnaTravel}
      Jwt__Audience: ${JWT_AUDIENCE:-MagnaTravelUsers}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      Cors__Origins__0: ${WEB_ORIGIN:-http://localhost:3000}
      WhatsApp__WebhookSecret: ${WHATSAPP_WEBHOOK_SECRET:-CHANGE_THIS_SECRET}
      WhatsApp__BotUrl: http://whatsapp-bot:3001
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    expose:
      - "8080"

  web:
    build:
      context: .
      dockerfile: src/TravelWeb/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: travel_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "3000:80"

  whatsapp-bot:
    build:
      context: .
      dockerfile: src/WhatsAppBot/Dockerfile
    container_name: travel_whatsapp_bot
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3001"
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth
    environment:
      WEBHOOK_URL: http://api:8080/api/webhooks/whatsapp
      WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-CHANGE_THIS_SECRET}
      BOT_SESSION_TIMEOUT_MINUTES: 30
      BOT_HTTP_PORT: 3001
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/status', { headers: { 'X-Webhook-Secret': process.env.WEBHOOK_SECRET || '' } }).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  whatsapp_auth:

