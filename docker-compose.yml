services:
  db:
    image: postgres:16
    container_name: travel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel}
      POSTGRES_USER: ${POSTGRES_USER:-traveluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./logs:/var/lib/postgresql/logs # Optional db logs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traveluser} -d ${POSTGRES_DB:-travel}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    expose:
      - "5432"
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: src/TravelApi/Dockerfile
    container_name: travel_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/Uploads
      - ./logs:/app/logs
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Database=${POSTGRES_DB:-travel};Username=${POSTGRES_USER:-traveluser};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      Security__EncryptionKey: ${SECURITY_ENCRYPTION_KEY:?SECURITY_ENCRYPTION_KEY is required}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: ${JWT_ISSUER:-MagnaTravel}
      Jwt__Audience: ${JWT_AUDIENCE:-MagnaTravelUsers}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      Cors__Origins__0: ${WEB_ORIGIN:-http://localhost:3000}
      WhatsApp__WebhookSecret: ${WHATSAPP_WEBHOOK_SECRET:?WHATSAPP_WEBHOOK_SECRET is required}
      WhatsApp__BotUrl: http://whatsapp-bot:3001
      Services__Reservations__BaseUrl: http://reservas-service:8080
      Services__Reservations__InternalToken: ${RESERVATIONS_INTERNAL_TOKEN:-CHANGE_THIS_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    expose:
      - "8080"
    networks:
      - backend
      - frontend

  web:
    build:
      context: .
      dockerfile: src/TravelWeb/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: travel_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      EMBED_ALLOWED_FRAME_ANCESTORS: ${EMBED_ALLOWED_FRAME_ANCESTORS:-'self'}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "3000:80"
    networks:
      - frontend

  whatsapp-bot:
    build:
      context: .
      dockerfile: src/WhatsAppBot/Dockerfile
    container_name: travel_whatsapp_bot
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3001"
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth
    environment:
      WEBHOOK_URL: http://api:8080/api/webhooks/whatsapp
      WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:?WHATSAPP_WEBHOOK_SECRET is required}
      BOT_SESSION_TIMEOUT_MINUTES: 30
      BOT_HTTP_PORT: 3001
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/status', { headers: { 'X-Webhook-Secret': process.env.WEBHOOK_SECRET || '' } }).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - frontend

  reservas-service:
    build:
      context: .
      dockerfile: src/TravelReservations.Api/Dockerfile
    container_name: travel_reservas_service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Database=${POSTGRES_DB:-travel};Username=${POSTGRES_USER:-traveluser};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      Security__EncryptionKey: ${SECURITY_ENCRYPTION_KEY:?SECURITY_ENCRYPTION_KEY is required}
      Services__Reservations__InternalToken: ${RESERVATIONS_INTERNAL_TOKEN:-CHANGE_THIS_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    expose:
      - "8080"
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: travel_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5672"
      - "15672"
    ports:
      - "15672:15672"
    networks:
      - backend

  minio:
    image: minio/minio
    container_name: travel_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "9000"
      - "9001"
    ports:
      - "9001:9001"
    networks:
      - backend
volumes:
  pgdata:
  whatsapp_auth:
  rabbitmq_data:
  minio_data:

networks:
  backend:
  frontend:
